server {
    listen 80;
    server_name nobio.myhomer-server.de;

    # Redirect HTTP to HTTPS (optional, depends on your certbot setup)
    # return 301 https://$host$request_uri;

    location /timetracker {
        # Proxy settings for Next.js
        proxy_pass http://timetracker-ui:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Forwarding headers
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Standard Next.js handles /timetracker/_next/ static assets automatically
        # when basePath is set. No extra location blocks are strictly needed 
        # unless you want custom caching for assets.
    }

    # If you want Nginx to handle static assets directly for better performance:
    # location /timetracker/_next/static {
    #     alias /path/to/your/app/.next/static;
    #     expires 365d;
    #     access_log off;
    # }
}
