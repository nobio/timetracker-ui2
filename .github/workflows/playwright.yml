name: Playwright E2E Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:5.0
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies (Backend)
      working-directory: ./api
      run: npm install

    - name: Start Backend API
      working-directory: ./api
      env:
        MONGODB_URI: mongodb://127.0.0.1:27017/timetracker
        SERVER_PORT: 30000
        ACCESS_TOKEN_SECRET: dummysecret
        REFRESH_TOKEN_SECRET: dummysecret
        CREATE_ADMIN: "true"
        ADMIN_PASSWORD: schernoo
      run: node ../server.js &
      # Note: We run ../server.js based on default project structure, adjusting as needed

    - name: Install dependencies (Frontend)
      working-directory: ./frontend
      run: npm install

    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps

    - name: Wait for API to be ready
      run: |
        echo "Waiting for backend on port 30000..."
        while ! nc -z localhost 30000; do
          sleep 1
        done
        echo "Backend is up!"

    - name: Seed Database with Test User
      working-directory: ./api
      run: |
        cat << 'EOF' > seed.js
        const mongoose = require('mongoose');
        const bcrypt = require('bcrypt');
        mongoose.connect('mongodb://127.0.0.1:27017/timetracker').then(async () => {
          const db = mongoose.connection.db;
          const salt = await bcrypt.genSalt(10);
          const password = await bcrypt.hash('tester12345', salt);
          await db.collection('users').insertOne({username: 'tester', name: 'Tester', mailAddress: 'test@example.com', password: password});
          console.log("Seeded tester account");
          process.exit(0);
        });
        EOF
        node seed.js

    - name: Run Playwright tests
      working-directory: ./frontend
      run: npx playwright test

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: frontend/playwright-report/
        retention-days: 30
